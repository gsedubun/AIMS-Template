version: '3.9'
services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: aims-sqlserver
    environment:
      ACCEPT_EULA: 'Y'
      SA_PASSWORD: 'Del12345!'
    ports:
      - '1433:1433'
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD", "/opt/mssql-tools/bin/sqlcmd", "-S", "localhost", "-U", "sa", "-P", "Del12345!", "-Q", "SELECT 1"]
      interval: 10s
      retries: 10
      timeout: 10s

  webfrontend:
    build:
      context: ./src/AIMS.WebFrontend
      dockerfile: Dockerfile
    image: aims-webfrontend
    container_name: aims-webfrontend
    depends_on:
      sqlserver:
        condition: service_healthy
    ports:
      - '8080:8080'
    environment:
      ASPNETCORE_URLS: 'http://+:8080'
      ASPNETCORE_ENVIRONMENT: 'Development'
      ConnectionStrings__DefaultConnection: 'Server=sqlserver;Database=aimsdbv2;User Id=sa;Password=Del12345!;Trusted_Connection=False;MultipleActiveResultSets=True;TrustServerCertificate=True'
    restart: unless-stopped

volumes:
  sqlserver-data:
